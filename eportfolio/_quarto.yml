project:
  type: website
  output-dir: docs

website:
  title: "Your Name | Portfolio"
  favicon: images/favicon.png
  navbar:
    logo: images/logo.png
    logo-alt: "Your Name"
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Reflection"
        href: reflection.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - text: "CV"
        href: cv/cv.pdf
        target: _blank
      - icon: github
        href: https://github.com/yourusername
        target: _blank
      - icon: linkedin
        href: https://linkedin.com/in/yourusername
        target: _blank

  page-footer:
    left: "© 2025 Your Name. All rights reserved."
    right: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      - flatly
      - styles.scss
    toc: false
    code-fold: true
    code-tools: true
    highlight-style: github
